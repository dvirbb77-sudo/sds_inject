# kubeadm-master.yaml - kubeadm configuration for control-plane node
# Reference: https://kubernetes.io/docs/reference/setup-tools/kubeadm/kubeadm-init/

apiVersion: kubeadm.k8s.io/v1beta3
kind: InitConfiguration
bootstrapToken:
  token: "abcdef.0123456789abcdef"
  description: "kubeadm bootstrap token"
  ttl: 24h
  usages:
    - signing
    - authentication

---
apiVersion: kubeadm.k8s.io/v1beta3
kind: ClusterConfiguration
kubernetesVersion: "1.31.1"
controlPlaneEndpoint: "127.0.0.1:6443"
etcd:
  local:
    dataDir: /var/lib/etcd
networking:
  dnsDomain: cluster.local
  podSubnet: "10.244.0.0/16"
  serviceSubnet: "10.96.0.0/12"
apiServer:
  certSANs:
    - "127.0.0.1"
    - "localhost"
  extraArgs:
    # Additional API server arguments
    - name: bind-address
      value: "0.0.0.0"
controllerManager:
  extraArgs: []
scheduler:
  extraArgs: []

---
apiVersion: kubelet.config.k8s.io/v1beta1
kind: KubeletConfiguration
cgroupDriver: systemd
failSwapOn: false
maxPods: 110
podsPerCore: 0
imageMinimumGCAge: 2m
imageGCHighThresholdPercent: 85
imageGCLowThresholdPercent: 80
